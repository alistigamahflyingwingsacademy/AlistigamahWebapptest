<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Al-Istiqaamah Flying Wings Academy</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f3f4f6;
}

.hero-pattern{
    background:linear-gradient(135deg,#0a2e2c,#0f3b38);
}

.sidebar{
    width:280px;
    background:#0f2e2c;
    transition:0.3s;
    flex-shrink:0;
}

.sidebar.collapsed{
    width:80px;
}

.sidebar.collapsed .nav-text{
    display:none;
}

.sidebar.collapsed .logo-text{
    display:none;
}

.nav-link{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    border-radius:10px;
    transition:0.2s;
}

.nav-link:hover{
    background:rgba(255,255,255,0.1);
}

.stat-card{
    background:white;
    border-radius:18px;
    padding:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.06);
}

.apply-btn{
    background:linear-gradient(135deg,#f59e0b,#d97706);
    color:white;
    font-weight:bold;
}

.toast{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#111827;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    z-index:9999;
    display:none;
}

.loading{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
}

.spinner{
    width:40px;
    height:40px;
    border:4px solid rgba(255,255,255,0.3);
    border-top-color:white;
    border-radius:50%;
    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    border:1px solid #e5e7eb;
    padding:10px;
    background:#f9fafb;
    text-align:left;
}

td{
    border:1px solid #e5e7eb;
    padding:10px;
}

main{
    min-width:0;
}

.carousel-slide{
    transition:opacity .5s;
}

@media(max-width:768px){

.sidebar{
    position:fixed;
    left:-280px;
    top:0;
    bottom:0;
    z-index:50;
}

.sidebar.open{
    left:0;
}

}
</style>
</head>

<body>

<div id="toast" class="toast"></div>

<div id="loading" class="loading">
<div class="spinner"></div>
</div>

<!-- LANDING -->
<div id="landingPage">

<div class="hero-pattern text-white py-20 px-6">
<div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between gap-10">

<div>
<h1 class="text-4xl font-bold">
Al-Istiqaamah
<span class="text-amber-300">Flying Wings Academy</span>
</h1>

<p class="mt-4 text-amber-100">
No.10 Federal Govt Layout Samaru Zaria Kaduna
</p>

<div class="flex gap-3 mt-6 flex-wrap">
<button id="openAdminLogin" class="apply-btn px-6 py-3 rounded-full">
Admin Login
</button>

<button id="openParentLogin" class="bg-emerald-600 px-6 py-3 rounded-full">
Parent Login
</button>
</div>
</div>

<div class="bg-white/10 p-6 rounded-2xl backdrop-blur-md">
<h3 class="font-bold text-xl">Live Time</h3>
<p id="liveTime" class="text-3xl mt-3"></p>
<p id="liveDate"></p>
</div>

</div>
</div>

<div class="max-w-6xl mx-auto px-6 py-10">

<div id="slidesContainer" class="relative overflow-hidden rounded-2xl h-[420px] bg-gray-800">

</div>

</div>

</div>

<!-- LOGIN -->
<div id="loginModal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50">

<div class="bg-white rounded-2xl p-8 w-[95%] max-w-md">

<h2 class="text-2xl font-bold mb-5">
Login
</h2>

<form id="adminLoginForm">

<input
id="email"
type="email"
placeholder="Email"
class="w-full border p-3 rounded mb-3"
required
/>

<input
id="password"
type="password"
placeholder="Password"
class="w-full border p-3 rounded mb-4"
required
/>

<button class="apply-btn w-full py-3 rounded-xl">
Login
</button>

</form>

<button
onclick="closeLogin()"
class="mt-4 text-red-500"
>
Close
</button>

</div>
</div>

<!-- PARENT LOGIN -->
<div id="parentModal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50">

<div class="bg-white rounded-2xl p-8 w-[95%] max-w-md">

<h2 class="text-2xl font-bold mb-5">
Parent Login
</h2>

<form id="parentLoginForm">

<input
id="regNo"
placeholder="Student Reg Number"
class="w-full border p-3 rounded mb-3"
required
/>

<input
id="parentPwd"
type="password"
placeholder="Password"
class="w-full border p-3 rounded mb-4"
required
/>

<button class="apply-btn w-full py-3 rounded-xl">
Login
</button>

</form>

<button
onclick="closeParent()"
class="mt-4 text-red-500"
>
Close
</button>

</div>
</div>

<!-- DASHBOARD -->
<div id="appContainer" class="hidden fixed inset-0 bg-gray-100">

<div class="flex h-full">

<!-- SIDEBAR -->
<aside id="sidebar" class="sidebar text-white flex flex-col">

<div class="p-4 border-b border-white/20 flex justify-between items-center">

<span class="logo-text font-bold text-amber-300">
Al-Istiqaamah
</span>

<button id="toggleSidebar">
<i class="fas fa-bars"></i>
</button>

</div>

<nav id="navMenu" class="p-3 space-y-2 flex-1 overflow-y-auto">

</nav>

</aside>

<!-- MAIN -->
<div class="flex-1 flex flex-col overflow-hidden">

<header class="bg-white shadow px-5 py-4 flex justify-between">

<div>
<span id="topUserName"></span>
(<span id="topUserRole"></span>)
</div>

<button
id="logoutBtn"
class="bg-red-500 text-white px-4 py-2 rounded"
>
Logout
</button>

</header>

<main
id="mainContent"
class="flex-1 overflow-auto p-5"
>
</main>

</div>

</div>

</div>

<script>

const SUPABASE_URL='https://sctxivdgqxdtpmrudotb.supabase.co';

const SUPABASE_KEY='sb_publishable_pKF1kDmzfWhcHhlINqTizw_c1iPE-yo';

const supabaseClient=supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let currentUser=null;

let schoolData={
students:[],
teachers:[]
};

let currentChart=null;

let slidesData=[];

let slideInterval;

let currentSlideIndex=0;

function toast(msg,error=false){

const t=document.getElementById('toast');

t.style.display='block';

t.style.background=error?'#dc2626':'#059669';

t.innerText=msg;

setTimeout(()=>{
t.style.display='none';
},4000);

}

function showLoading(){
document.getElementById('loading').style.display='flex';
}

function hideLoading(){
document.getElementById('loading').style.display='none';
}

function escapeHtml(str){
if(!str)return '';
return String(str)
.replace(/&/g,'&amp;')
.replace(/</g,'&lt;')
.replace(/>/g,'&gt;');
}

async function refreshSchoolData(){

showLoading();

try{

const studentsRes=
await supabaseClient
.from('students')
.select('*');

const teachersRes=
await supabaseClient
.from('teachers')
.select('*');

schoolData.students=studentsRes.data||[];

schoolData.teachers=teachersRes.data||[];

}catch(e){

toast(e.message,true);

}finally{

hideLoading();

}

}

function getNavItemsByRole(){

const role=currentUser.role;

if(role==='dg_ceo'||role==='umc'){

return[
{id:'dashboard',icon:'🏠',label:'Dashboard'},
{id:'students',icon:'📚',label:'Students'},
{id:'enroll',icon:'🎓',label:'Enroll'},
{id:'fees',icon:'💰',label:'Fees'},
{id:'results',icon:'📊',label:'Results'},
{id:'staff',icon:'👥',label:'Staff'}
];

}

if(role==='parent'){

return[
{id:'child-reports',icon:'📖',label:'Reports'},
{id:'payment-history',icon:'💳',label:'Payments'}
];

}

return[
{id:'dashboard',icon:'🏠',label:'Dashboard'}
];

}

function buildSidebar(){

const nav=getNavItemsByRole();

document.getElementById('navMenu').innerHTML=
nav.map(n=>`
<a href="#"
class="nav-link"
data-view="${n.id}">
<span>${n.icon}</span>
<span class="nav-text">${n.label}</span>
</a>
`).join('');

document.querySelectorAll('.nav-link')
.forEach(link=>{

link.onclick=(e)=>{

e.preventDefault();

renderContent(link.dataset.view);

};

});

}

async function renderDashboard(){

const totalStudents=schoolData.students.length;

const totalStaff=schoolData.teachers.length;

document.getElementById('mainContent').innerHTML=`

<div class="grid md:grid-cols-3 gap-5">

<div class="stat-card">
<h2 class="text-3xl font-bold">${totalStudents}</h2>
<p>Total Students</p>
</div>

<div class="stat-card">
<h2 class="text-3xl font-bold">${totalStaff}</h2>
<p>Total Staff</p>
</div>

<div class="stat-card">
<h2 class="text-3xl font-bold">
₦${(totalStudents*50000).toLocaleString()}
</h2>
<p>Estimated Revenue</p>
</div>

</div>

<div class="stat-card mt-6">
<canvas id="chartCanvas"></canvas>
</div>

`;

setTimeout(()=>{

const ctx=document
.getElementById('chartCanvas')
.getContext('2d');

if(currentChart){
currentChart.destroy();
}

currentChart=new Chart(ctx,{
type:'bar',
data:{
labels:['Students','Staff'],
datasets:[{
label:'School Data',
data:[totalStudents,totalStaff]
}]
}
});

},100);

}

function renderStudents(){

document.getElementById('mainContent').innerHTML=`

<div class="stat-card">

<h2 class="text-2xl font-bold mb-4">
Students
</h2>

<div class="overflow-auto">

<table>

<thead>
<tr>
<th>Reg No</th>
<th>Name</th>
<th>Section</th>
<th>Status</th>
</tr>
</thead>

<tbody>

${schoolData.students.map(s=>`

<tr>
<td>${escapeHtml(s.reg_number)}</td>
<td>${escapeHtml(s.name)}</td>
<td>${escapeHtml(s.section||'-')}</td>
<td>${escapeHtml(s.status||'-')}</td>
</tr>

`).join('')}

</tbody>

</table>

</div>

</div>

`;

}

function renderEnroll(){

document.getElementById('mainContent').innerHTML=`

<div class="stat-card">

<h2 class="text-2xl font-bold mb-4">
Enroll Student
</h2>

<form id="enrollForm" class="grid md:grid-cols-2 gap-4">

<input
name="name"
placeholder="Full Name"
class="border p-3 rounded"
required
/>

<input
name="reg_number"
placeholder="Registration Number"
class="border p-3 rounded"
required
/>

<input
name="section"
placeholder="Section"
class="border p-3 rounded"
required
/>

<input
name="parent_email"
type="email"
placeholder="Parent Email"
class="border p-3 rounded"
/>

<button
id="enrollBtn"
class="apply-btn py-3 rounded col-span-2"
>
Enroll Student
</button>

</form>

</div>

`;

document.getElementById('enrollForm')
.onsubmit=async(e)=>{

e.preventDefault();

const btn=document.getElementById('enrollBtn');

btn.disabled=true;

btn.innerHTML='Processing...';

const fd=new FormData(e.target);

const data=Object.fromEntries(fd.entries());

const {error}=await supabaseClient
.from('students')
.insert([{
...data,
status:'active'
}]);

btn.disabled=false;

btn.innerHTML='Enroll Student';

if(error){

toast(error.message,true);

}else{

toast('Student enrolled');

await refreshSchoolData();

renderStudents();

}

};

}

async function renderFees(){

document.getElementById('mainContent').innerHTML=`

<div class="stat-card">

<h2 class="text-2xl font-bold mb-4">
Fee Management
</h2>

<select id="feeStudent"
class="border p-3 rounded w-full mb-3">

<option value="">
Select Student
</option>

${schoolData.students.map(s=>`
<option value="${s.id}">
${s.name}
</option>
`).join('')}

</select>

<input
id="feeAmount"
type="number"
placeholder="Amount"
class="border p-3 rounded w-full mb-3"
/>

<button
id="payBtn"
class="apply-btn px-6 py-3 rounded"
>
Record Payment
</button>

</div>

`;

document.getElementById('payBtn')
.onclick=async()=>{

const studentId=
document.getElementById('feeStudent').value;

const amount=
parseFloat(
document.getElementById('feeAmount').value
);

if(!studentId||!amount){

toast('Fill all fields',true);

return;

}

const receipt=
'RCPT-'+Date.now();

const {error}=await supabaseClient
.from('fee_transactions')
.insert([{
student_id:studentId,
amount_paid:amount,
receipt_no:receipt
}]);

if(error){

toast(error.message,true);

}else{

toast('Payment recorded');

}

};

}

async function renderResults(){

document.getElementById('mainContent').innerHTML=`

<div class="stat-card">

<h2 class="text-2xl font-bold mb-4">
Student Results
</h2>

<form id="resultForm" class="grid md:grid-cols-2 gap-4">

<select
id="studentResult"
class="border p-3 rounded"
required
>

<option value="">
Select Student
</option>

${schoolData.students.map(s=>`
<option value="${s.id}">
${s.name}
</option>
`).join('')}

</select>

<input
id="subject"
placeholder="Subject"
class="border p-3 rounded"
required
/>

<input
id="ca1"
type="number"
placeholder="CA1 /20"
class="border p-3 rounded"
required
/>

<input
id="ca2"
type="number"
placeholder="CA2 /20"
class="border p-3 rounded"
required
/>

<input
id="exam"
type="number"
placeholder="Exam /60"
class="border p-3 rounded"
required
/>

<button class="apply-btn py-3 rounded col-span-2">
Save Result
</button>

</form>

</div>

`;

document.getElementById('resultForm')
.onsubmit=async(e)=>{

e.preventDefault();

const studentId=
document.getElementById('studentResult').value;

const subject=
document.getElementById('subject').value;

const ca1=
parseInt(document.getElementById('ca1').value)||0;

const ca2=
parseInt(document.getElementById('ca2').value)||0;

const exam=
parseInt(document.getElementById('exam').value)||0;

const total=ca1+ca2+exam;

const grade=
total>=80?'A':
total>=70?'B':
total>=60?'C':
total>=50?'D':'F';

const {error}=await supabaseClient
.from('student_results')
.insert([{
student_id:studentId,
subject,
ca1,
ca2,
exam,
total_score:total,
grade
}]);

if(error){

toast(error.message,true);

}else{

toast('Result saved');

}

};

}

function renderStaff(){

document.getElementById('mainContent').innerHTML=`

<div class="stat-card">

<h2 class="text-2xl font-bold mb-4">
Staff
</h2>

<ul class="space-y-2">

${schoolData.teachers.map(t=>`
<li>
${escapeHtml(t.full_name)}
(${escapeHtml(t.role)})
</li>
`).join('')}

</ul>

</div>

`;

}

function renderParentDashboard(){

document.getElementById('mainContent').innerHTML=`

<div class="stat-card">

<h2 class="text-2xl font-bold">
Parent Dashboard
</h2>

<p class="mt-2">
View child reports and payment history
</p>

</div>

`;

}

function renderContent(view){

switch(view){

case'dashboard':
renderDashboard();
break;

case'students':
renderStudents();
break;

case'enroll':
renderEnroll();
break;

case'fees':
renderFees();
break;

case'results':
renderResults();
break;

case'staff':
renderStaff();
break;

case'child-reports':
renderParentDashboard();
break;

case'payment-history':
renderParentDashboard();
break;

default:
renderDashboard();

}

}

function showDashboard(){

document.getElementById('landingPage')
.style.display='none';

document.getElementById('appContainer')
.classList.remove('hidden');

document.getElementById('topUserName')
.innerText=currentUser.full_name;

document.getElementById('topUserRole')
.innerText=currentUser.role;

buildSidebar();

renderDashboard();

}

async function loginAdmin(email,password){

showLoading();

try{

const {data,error}=
await supabaseClient.auth
.signInWithPassword({
email,
password
});

if(error)throw error;

const {data:profile}=await supabaseClient
.from('profiles')
.select('*')
.eq('id',data.user.id)
.single();

if(!profile){

throw new Error('Profile not found');

}

currentUser={
id:profile.id,
full_name:profile.full_name,
role:profile.role
};

await refreshSchoolData();

showDashboard();

}catch(e){

toast(e.message,true);

}finally{

hideLoading();

}

}

async function parentLogin(reg,password){

showLoading();

try{

const {data,error}=
await supabaseClient
.from('students')
.select('*')
.eq('reg_number',reg)
.eq('parent_password',password)
.single();

if(error||!data){

throw new Error('Invalid login');

}

currentUser={
role:'parent',
full_name:'Parent',
studentId:data.id
};

await refreshSchoolData();

showDashboard();

}catch(e){

toast(e.message,true);

}finally{

hideLoading();

}

}

function renderSlides(){

const container=
document.getElementById('slidesContainer');

container.innerHTML=
slidesData.map((s,i)=>`

<div
class="carousel-slide absolute inset-0 bg-cover bg-center ${i===0?'opacity-100':'opacity-0'}"
style="background-image:url('${s.url}')"
>

<div class="absolute bottom-0 w-full bg-black/60 text-white p-4">
${escapeHtml(s.caption)}
</div>

</div>

`).join('');

clearInterval(slideInterval);

slideInterval=setInterval(()=>{

const slides=
document.querySelectorAll('.carousel-slide');

slides.forEach(slide=>{
slide.classList.remove('opacity-100');
slide.classList.add('opacity-0');
});

currentSlideIndex=
(currentSlideIndex+1)%slides.length;

slides[currentSlideIndex]
.classList.remove('opacity-0');

slides[currentSlideIndex]
.classList.add('opacity-100');

},5000);

}

async function loadSlides(){

const {data}=await supabaseClient
.from('slides')
.select('*');

slidesData=data||[
{
url:'https://picsum.photos/1200/600',
caption:'Welcome'
}
];

renderSlides();

}

function closeLogin(){

document.getElementById('loginModal')
.style.display='none';

}

function closeParent(){

document.getElementById('parentModal')
.style.display='none';

}

document.getElementById('openAdminLogin')
.onclick=()=>{

document.getElementById('loginModal')
.style.display='flex';

};

document.getElementById('openParentLogin')
.onclick=()=>{

document.getElementById('parentModal')
.style.display='flex';

};

document.getElementById('adminLoginForm')
.onsubmit=(e)=>{

e.preventDefault();

loginAdmin(
document.getElementById('email').value,
document.getElementById('password').value
);

};

document.getElementById('parentLoginForm')
.onsubmit=(e)=>{

e.preventDefault();

parentLogin(
document.getElementById('regNo').value,
document.getElementById('parentPwd').value
);

};

document.getElementById('logoutBtn')
.onclick=()=>{

location.reload();

};

document.getElementById('toggleSidebar')
.onclick=()=>{

document.getElementById('sidebar')
.classList.toggle('collapsed');

};

setInterval(()=>{

const d=new Date();

document.getElementById('liveTime')
.innerText=d.toLocaleTimeString();

document.getElementById('liveDate')
.innerText=d.toDateString();

},1000);

async function restoreSession(){

const {data}=await supabaseClient
.auth
.getSession();

if(data.session){

const user=data.session.user;

const {data:profile}=await supabaseClient
.from('profiles')
.select('*')
.eq('id',user.id)
.single();

if(profile){

currentUser={
id:profile.id,
full_name:profile.full_name,
role:profile.role
};

await refreshSchoolData();

showDashboard();

}

}

}

async function init(){

await loadSlides();

await restoreSession();

}

init();

</script>

</body>
    </html>
